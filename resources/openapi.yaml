components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: Sanctum API token. Generate one from Settings > API Tokens.

  parameters:
    WorkspaceHeader:
      name: X-Workspace-Id
      in: header
      required: false
      schema:
        type: integer
      description: |
        Workspace ID this request targets. Required for tokens that have
        access to multiple workspaces or to all workspaces. Optional for
        tokens scoped to a single workspace (auto-resolved).
    PerPage:
      name: per_page
      in: query
      schema:
        type: integer
        default: 25
        maximum: 100
    Page:
      name: page
      in: query
      schema: { type: integer, default: 1 }
    TicketUlid:
      name: ticket
      in: path
      required: true
      schema: { type: string }
      description: Ticket ULID.
    ContactUlid:
      name: contact
      in: path
      required: true
      schema: { type: string }
      description: Contact ULID.
    TagUlid:
      name: tag
      in: path
      required: true
      schema: { type: string }
      description: Tag ULID.
    BrainUlid:
      name: brain
      in: path
      required: true
      schema: { type: string }
      description: Brain ULID.

  responses:
    Unauthenticated:
      description: Missing or invalid token
      content:
        application/json:
          schema:
            type: object
            properties:
              message: { type: string }
    Forbidden:
      description: Not allowed
      content:
        application/json:
          schema:
            type: object
            properties:
              message: { type: string }
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            type: object
            properties:
              message: { type: string }
    ValidationError:
      description: Validation failed
      content:
        application/json:
          schema:
            type: object
            properties:
              message: { type: string }
              errors:
                type: object
                additionalProperties:
                  type: array
                  items: { type: string }

  schemas:
    User:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        email: { type: string, format: email }
        avatar_url: { type: string, nullable: true }
        timezone: { type: string, nullable: true }

    Workspace:
      type: object
      properties:
        id: { type: integer }
        ulid: { type: string }
        name: { type: string }
        slug: { type: string }

    Channel:
      type: object
      properties:
        id: { type: integer }
        ulid: { type: string }
        name: { type: string }
        type:
          type: string
          enum: [email, widget]
        color: { type: string }
        email_address: { type: string, nullable: true }

    Tag:
      type: object
      properties:
        id: { type: integer }
        ulid: { type: string }
        name: { type: string }
        color: { type: string }

    Contact:
      type: object
      properties:
        id: { type: integer }
        ulid: { type: string }
        name: { type: string, nullable: true }
        email: { type: string, format: email }
        avatar_url: { type: string, nullable: true }
        ticket_count: { type: integer, nullable: true }
        last_activity_at: { type: string, format: date-time, nullable: true }
        notes: { type: string, nullable: true }

    Team:
      type: object
      properties:
        id: { type: integer }
        ulid: { type: string }
        name: { type: string }
        description: { type: string, nullable: true }
        logo_url: { type: string, nullable: true }
        member_count: { type: integer }

    QuickReply:
      type: object
      properties:
        id: { type: integer }
        ulid: { type: string }
        name: { type: string }
        body: { type: string }

    SavedView:
      type: object
      properties:
        id: { type: integer }
        ulid: { type: string }
        name: { type: string }
        slug: { type: string }
        icon: { type: string, nullable: true }
        is_personal: { type: boolean }
        search: { type: string, nullable: true }
        statuses:
          type: array
          items: { type: string }
          nullable: true
        assigned_to_me: { type: boolean }
        unassigned: { type: boolean }
        assigned_user_id: { type: integer, nullable: true }
        channel_ids:
          type: array
          items: { type: integer }
        tag_ids:
          type: array
          items: { type: integer }

    WorkflowConditionInput:
      type: object
      required: [type, parameters]
      properties:
        type:
          type: string
          enum:
            - body_contains
            - channel_is
            - contact_is_new
            - from_domain_equals
            - from_email_contains
            - from_email_equals
            - subject_contains
            - subject_equals
        parameters: { type: object }

    WorkflowActionInput:
      type: object
      required: [type, parameters]
      properties:
        type: { type: string }
        parameters: { type: object }

    Workflow:
      type: object
      properties:
        id: { type: integer }
        ulid: { type: string }
        name: { type: string }
        description: { type: string, nullable: true }
        trigger_type:
          type: string
          enum: [automatic, manual]
        condition_match_type:
          type: string
          enum: [all, any]
        is_enabled: { type: boolean }
        order_column: { type: integer }
        created_at: { type: string, format: date-time }
        conditions:
          type: array
          items:
            type: object
            properties:
              id: { type: integer }
              ulid: { type: string }
              type: { type: string }
              parameters: { type: object }
        actions:
          type: array
          items:
            type: object
            properties:
              id: { type: integer }
              ulid: { type: string }
              type: { type: string }
              parameters: { type: object }

    Brain:
      type: object
      properties:
        id: { type: integer }
        ulid: { type: string }
        name: { type: string }
        additional_instructions: { type: string, nullable: true }
        article_count: { type: integer }
        created_at: { type: string, format: date-time }

    BrainArticle:
      type: object
      properties:
        id: { type: integer }
        ulid: { type: string }
        brain_id: { type: integer }
        title: { type: string }
        body: { type: string }
        is_public: { type: boolean }
        last_edited_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    Message:
      type: object
      properties:
        id: { type: integer }
        ulid: { type: string }
        type:
          type: string
          enum: [inbound, outbound, note]
        body_html: { type: string }
        body_text: { type: string, nullable: true }
        sender:
          type: object
          properties:
            id: { type: integer }
            type: { type: string, enum: [contact, user] }
            name: { type: string, nullable: true }
            email: { type: string, nullable: true }
            avatar_url: { type: string, nullable: true }
        attachments:
          type: array
          items:
            type: object
            properties:
              id: { type: integer }
              name: { type: string }
              url: { type: string, format: uri }
              size: { type: integer }
              mime_type: { type: string }
        is_forward: { type: boolean }
        send_status: { type: string, nullable: true }
        created_at: { type: string, format: date-time }

    Activity:
      type: object
      properties:
        id: { type: integer }
        type: { type: string }
        user:
          oneOf:
            - $ref: '#/components/schemas/User'
            - type: 'null'
        properties:
          type: object
          nullable: true
        description: { type: string }
        created_at: { type: string, format: date-time }

    Ticket:
      type: object
      properties:
        id: { type: integer }
        ulid: { type: string }
        number: { type: integer }
        subject: { type: string }
        status:
          type: string
          enum: [open, waiting, closed, spam]
        channel: { $ref: '#/components/schemas/Channel' }
        assignee:
          oneOf:
            - $ref: '#/components/schemas/User'
            - type: 'null'
        assigned_team:
          oneOf:
            - $ref: '#/components/schemas/Team'
            - type: 'null'
        contact: { $ref: '#/components/schemas/Contact' }
        tags:
          type: array
          items: { $ref: '#/components/schemas/Tag' }
        latest_message_preview: { type: string, nullable: true }
        summary: { type: string, nullable: true }
        title: { type: string, nullable: true }
        from_address: { type: string, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        last_activity_at: { type: string, format: date-time }

    TicketDetail:
      allOf:
        - $ref: '#/components/schemas/Ticket'
        - type: object
          properties:
            messages:
              type: array
              items: { $ref: '#/components/schemas/Message' }
            activities:
              type: array
              items: { $ref: '#/components/schemas/Activity' }

    PaginationMeta:
      type: object
      properties:
        current_page: { type: integer }
        last_page: { type: integer }
        per_page: { type: integer }
        total: { type: integer }

    PaginationLinks:
      type: object
      properties:
        first: { type: string, nullable: true }
        last: { type: string, nullable: true }
        prev: { type: string, nullable: true }
        next: { type: string, nullable: true }

    PaginatedTickets:
      type: object
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/Ticket' }
        meta: { $ref: '#/components/schemas/PaginationMeta' }
        links: { $ref: '#/components/schemas/PaginationLinks' }

    PaginatedContacts:
      type: object
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/Contact' }
        meta: { $ref: '#/components/schemas/PaginationMeta' }
        links: { $ref: '#/components/schemas/PaginationLinks' }

    PaginatedActivities:
      type: object
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/Activity' }
        meta: { $ref: '#/components/schemas/PaginationMeta' }
        links: { $ref: '#/components/schemas/PaginationLinks' }
